name: Test OCI OIDC Upload

# TEMPORARY workflow used to verify the OCI OIDC auth + upload flow
# without having to push a real release tag. Delete this file once
# the release.yml flow has been proven to work end-to-end.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-upload:
    runs-on: oracle-vm-16cpu-64gb-x86-64
    timeout-minutes: 10
    permissions:
      id-token: write
    env:
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_DOMAIN_URL: ${{ secrets.OCI_DOMAIN_URL }}
      OCI_CLIENT_ID: ${{ secrets.OCI_CLIENT_ID }}
      OCI_CLIENT_SECRET: ${{ secrets.OCI_CLIENT_SECRET }}
      OCI_TARGET_USER_OCID: ${{ secrets.OCI_TARGET_USER_OCID }}
      OCI_REGION: ${{ vars.OCI_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create dummy .zst file to upload
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          date -u +'test-marker-%Y%m%dT%H%M%SZ' > test-marker.txt
          echo "run_id=${RUN_ID}" >> test-marker.txt
          if command -v zstd >/dev/null 2>&1; then
            zstd -19 test-marker.txt -o test-marker.txt.zst
          else
            cp test-marker.txt test-marker.txt.zst
          fi
          ls -la test-marker.txt*

      - name: Upload via composite action
        uses: ./.github/actions/oci-oidc-upload
        with:
          prefix: test/${{ github.run_id }}/
