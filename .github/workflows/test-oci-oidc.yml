name: Test OCI OIDC Upload

# TEMPORARY workflow to verify the OCI OIDC auth + upload flow against
# a real GitHub OIDC token, without waiting on the full image build.
# Delete this file once the production release.yml is proven to work.

on:
  push:
    branches:
      - oci-oidc-upload
  workflow_dispatch:

# Cancel any in-flight run on this branch when a new push arrives.
concurrency:
  group: test-oci-oidc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write
    env:
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_DOMAIN_URL: ${{ secrets.OCI_DOMAIN_URL }}
      OCI_CLIENT_ID: ${{ secrets.OCI_CLIENT_ID }}
      OCI_CLIENT_SECRET: ${{ secrets.OCI_CLIENT_SECRET }}
      OCI_TARGET_USER_OCID: ${{ secrets.OCI_TARGET_USER_OCID }}
      OCI_REGION: ${{ vars.OCI_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create dummy .zst marker file
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          printf 'oci-oidc-test marker\nrun_id=%s\nutc=%s\n' "$RUN_ID" "$(date -u -Iseconds)" \
            > test-marker.zst
          ls -la test-marker.zst

      - name: Upload via composite action
        uses: ./.github/actions/oci-oidc-upload
        with:
          prefix: test/${{ github.run_id }}/
